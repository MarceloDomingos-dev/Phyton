{% extends "base.html" %}

{% block title %}Painel - Tarefas{% endblock %}

{% block content %}
<div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3 mb-4">
  <div>
    <h1 class="h2 mb-1">Painel de tarefas</h1>
    <p class="text-body-secondary mb-0">{{ advice }}</p>
  </div>
  <a class="btn btn-primary" href="{{ url_for('nova_tarefa') }}">
    <i class="bi bi-plus-lg me-1"></i> Nova tarefa
  </a>
</div>

<section class="toolbar mb-4">
  <div class="row g-3 align-items-end">
    <div class="col-12 col-md-4">
      <label class="form-label" for="statusFilter">Status</label>
      <select class="form-select" id="statusFilter">
        <option value="todas">Todas</option>
        {% for value, label in status_options.items() %}
          <option value="{{ value }}">{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12 col-md-8">
      <div class="summary-grid" id="summaryGrid">
        <div class="summary-item">
          <span class="summary-label">Pendentes</span>
          <strong id="countPendente">0</strong>
        </div>
        <div class="summary-item">
          <span class="summary-label">Em andamento</span>
          <strong id="countAndamento">0</strong>
        </div>
        <div class="summary-item">
          <span class="summary-label">Concluidas</span>
          <strong id="countConcluida">0</strong>
        </div>
      </div>
    </div>
  </div>
</section>

<section id="tasksGrid" class="task-grid" aria-live="polite"></section>
<div id="emptyState" class="empty-state d-none">
  <i class="bi bi-list-check"></i>
  <p>Nenhuma tarefa encontrada.</p>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
{% endblock %}
