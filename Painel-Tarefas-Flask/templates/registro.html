{% extends "base.html" %}

{% block title %}Cadastro - Painel de Tarefas{% endblock %}

{% block content %}
<div class="auth-wrap">
  <section class="auth-panel">
    <h1 class="h3 mb-3">Criar conta</h1>
    <form method="post" class="vstack gap-3">
      <div>
        <label class="form-label" for="nome">Nome</label>
        <input class="form-control" id="nome" name="nome" required autofocus>
      </div>
      <div>
        <label class="form-label" for="email">E-mail</label>
        <input class="form-control" id="email" name="email" type="email" required>
      </div>
      <div>
        <label class="form-label" for="senha">Senha</label>
        <input class="form-control" id="senha" name="senha" type="password" required>
      </div>
      <button class="btn btn-primary" type="submit">
        <i class="bi bi-person-plus me-1"></i> Cadastrar
      </button>
    </form>
    <p class="mt-3 mb-0 text-body-secondary">
      Ja tenho conta. <a href="{{ url_for('login') }}">Entrar</a>
    </p>
  </section>
</div>
{% endblock %}
