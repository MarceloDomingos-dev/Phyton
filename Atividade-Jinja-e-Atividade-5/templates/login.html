<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login Escolar</title>
</head>
<body>
    <h2>Login Escolar</h2>
 
    {% if erro %}
    <p style="color: red;">{{ erro }}</p>
    {% endif %}

    <form method="POST">
        <input type="text" name="usuario" placeholder="Nome do Aluno" required><br><br>
        <input type="password" name="senha" placeholder="Matrícula" required><br><br>
        <button type="submit">Entrar</button>
    </form>
</body>
</html>
